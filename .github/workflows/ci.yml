# Smoke check: every time push / When making a PR, install dependencies in a clean environment and try to build the backend app.
# The purpose is to stop"Can run locally, can’t be installed in a clean environment"question(If a dependency is omitted), so that it cannot reach the hands of users.
name: CI

on:
  push:
  pull_request:

jobs:
  backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11" # with backend/The base image of Dockerfile is consistent
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: build backend app(Import the entire dependency tree + Assembly routing)
        run: |
          python -c "from backend.app import create_app; create_app(); print('OK app builds')"

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22" # with frontend/The base image of Dockerfile is consistent
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies(npm ci: strictly press lockfile, and check whether lock is synchronized)
        run: npm ci

      - name: Build front-end(vite build, block syntax errors/bad import/Missing dependencies)
        run: npm run build
